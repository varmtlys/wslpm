name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path build/Release/wslpm.exe -DestinationPath wslpm-${{ github.ref_name }}.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wslpm-*.zip
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
